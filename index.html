<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>TapBox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        background: #0f0;
        font-family: system-ui, sans-serif;
        text-align: center;
        padding-top: 50px;
      }
      button {
        font-size: 20px;
        padding: 15px 25px;
        margin: 10px;
        border-radius: 12px;
        border: none;
        background: #222;
        color: white;
      }
      button:active {
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <h1>TapBox</h1>

    <!-- SONS -->
    <audio id="sonBruh" src="son_bruh.mp3"></audio>
    <audio id="sonVictory" src="son_victory.mp3"></audio>

    <!-- BOUTONS -->
    <button onclick="document.getElementById('sonBruh').play()">Bruh</button>
    <button onclick="document.getElementById('sonVictory').play()">Victory Royale</button>

  </body>
</html>
