<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>TapBox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
      /* --- FOND ANIMÉ COMPATIBLE iPHONE --- */
      body {
        margin: 0;
        padding: 20px;
        background: linear-gradient(135deg, #000428, #004e92);
        animation: bgMove 10s infinite alternate;
        font-family: system-ui, sans-serif;
        color: white;
        overflow-y: auto;
        text-align: center;
      }

      @keyframes bgMove {
        0% { background-position: 0% 0%; }
        100% { background-position: 100% 100%; }
      }

      /* --- TITRE --- */
      h1 {
        font-size: 50px;
        margin-bottom: 40px;
        text-shadow: 0 0 20px #00eaff, 0 0 40px #00eaff;
        animation: pulseTitle 2s infinite alternate;
      }

      @keyframes pulseTitle {
        from { text-shadow: 0 0 20px #00eaff; }
        to { text-shadow: 0 0 40px #00eaff; }
      }

      /* --- BOUTONS NÉON --- */
      button {
        font-size: 24px;
        padding: 18px 40px;
        margin: 15px;
        border-radius: 14px;
        border: 2px solid #00eaff;
        background: rgba(0, 0, 0, 0.4);
        color: white;
        cursor: pointer;
        transition: 0.2s ease;
        box-shadow: 0 0 15px #00eaff;
        width: 80%;
        max-width: 350px;
      }

      button:hover {
        transform: scale(1.12);
        box-shadow: 0 0 30px #00eaff;
      }

      button:active {
        transform: scale(0.95);
        box-shadow: 0 0 10px #00eaff;
      }
    </style>
  </head>

  <body>

    <h1 id="title">TapBox</h1>

    <!-- SONS -->
    <audio id="sonBruh" src="Bruh.mp3"></audio>
    <audio id="sonVictory" src="Victory.mp3"></audio>
    <audio id="sonOof" src="OOF.mp3"></audio>
    <audio id="sonEau" src="Eau.mp3"></audio>
    <audio id="sonChevre" src="Chevre.mp3"></audio>
    <audio id="sonChat" src="Chat.mp3"></audio>
    <audio id="sonChien" src="Chien.mp3"></audio>

    <!-- BOUTON LANGUE AVEC DRAPEAUX -->
    <button onclick="toggleLang()" id="btnLang">🇫🇷 Français</button>

    <!-- BOUTONS -->
    <button onclick="document.getElementById('sonBruh').play()" id="btnBruh">Bruh</button>
    <button onclick="document.getElementById('sonVictory').play()" id="btnVictory">Victory Royale</button>
    <button onclick="document.getElementById('sonOof').play()" id="btnOof">Roblox OOF</button>
    <button onclick="document.getElementById('sonEau').play()" id="btnEau">Goutte d’eau</button>
    <button onclick="document.getElementById('sonChevre').play()" id="btnChevre">Chèvre</button>
    <button onclick="document.getElementById('sonChat').play()" id="btnChat">Chat</button>
    <button onclick="document.getElementById('sonChien').play()" id="btnChien">Chien</button>

    <script>
      let french = true;

      function toggleLang() {
        french = !french;

        if (french) {
          document.getElementById("btnLang").innerText = "🇫🇷 Français";
          document.getElementById("btnEau").innerText = "Goutte d’eau";
          document.getElementById("btnChevre").innerText = "Chèvre";
          document.getElementById("btnChat").innerText = "Chat";
          document.getElementById("btnChien").innerText = "Chien";
        } else {
          document.getElementById("btnLang").innerText = "🇬🇧 English";
          document.getElementById("btnEau").innerText = "Water Drop";
          document.getElementById("btnChevre").innerText = "Goat";
          document.getElementById("btnChat").innerText = "Cat";
          document.getElementById("btnChien").innerText = "Dog";
        }
      }
    </script>

  </body>
</html>
