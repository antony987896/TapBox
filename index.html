<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>TapBox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        background: #0f0;
        font-family: system-ui, sans-serif;
        text-align: center;
        padding-top: 50px;
      }
      button {
        font-size: 20px;
        padding: 15px 25px;
        margin: 10px;
        border-radius: 12px;
        border: none;
        background: #222;
        color: white;
      }
      button:active {
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <h1>TapBox</h1>
    <button onclick="alert('Bruh 😎')">Bruh</button>
    <button onclick="alert('Victory Royale 🏆')">Fortnite</button>
  </body>
</html>
